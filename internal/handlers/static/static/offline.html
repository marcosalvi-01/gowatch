<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Gowatch - Offline</title>
		<style>
			:root {
				color-scheme: dark;
			}

			body {
				margin: 0;
				font-family: system-ui, -apple-system, sans-serif;
				background: #09090b;
				color: #fafafa;
				display: grid;
				place-items: center;
				min-height: 100vh;
				padding: 24px;
			}

			main {
				max-width: 420px;
				background: #18181b;
				border: 1px solid #27272a;
				border-radius: 12px;
				padding: 20px;
			}

			h1 {
				margin: 0 0 8px;
				font-size: 1.3rem;
			}

			p {
				margin: 0;
				line-height: 1.5;
				color: #d4d4d8;
			}

			a {
				display: inline-block;
				margin-top: 14px;
				color: #facc15;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>You are offline</h1>
			<p>Gowatch cannot reach the server right now. Reconnect and refresh to continue.</p>
			<a href="/">Try again</a>
		</main>
	</body>
</html>
